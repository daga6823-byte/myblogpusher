<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>記事編集</title>
	<link rel="stylesheet" th:href="@{/css/article_edit.css}">
	<link rel="stylesheet" th:href="@{/css/code_block_editor.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div class="edit-box">
		<h1>記事編集</h1>

		<div id="savedMessage" th:if="${saved}"
			style="background-color:#d4edda; color:#155724; padding:12px 16px; border-radius:4px; margin-bottom:16px;">
			下書きが保存されました。
		</div>

		<form th:action="@{/article/save}" method="post">

			<div th:replace="~{fragments/article_form :: formFields}"></div>
			<div th:replace="~{fragments/code_block_editor :: codeBlockEditor}"></div>
			<div th:replace="~{fragments/image_modal :: imageModal}"></div>

			<div class="button-row">
				<button type="submit" formaction="/article/save" class="btn-save" disabled>一時保存</button>
				<button type="button" id="listButton" class="btn-back">下書き一覧</button>
				<button type="button" id="copyAllButton" class="btn-back">内容を一括コピー</button>
				<button type="button" id="clearButton" class="btn-clear">クリア</button>
				<button type="submit" formaction="/article/correct" class="btn-publish" disabled>添削</button>
				<button type="button" class="btn-publish" id="publishButton">投稿</button>
				<button type="button" id="backButton" class="btn-back">戻る</button>
			</div>

		</form>
	</div>

	<script th:src="@{/js/article_edit.js}"></script>
	<script th:src="@{/js/article_list.js}"></script>
	<script th:src="@{/js/navigation.js}"></script>
	<script th:src="@{/js/frontmatter.js}"></script>
	<script th:src="@{/js/workspace.js}"></script>
	<script th:src="@{/js/image_manager.js}"></script>
	<script th:src="@{/js/code_editor.js}"></script>
	<script th:src="@{/js/publish.js}"></script>
	<script th:src="@{/js/footnote_editor.js}"></script>
</body>

</html>
