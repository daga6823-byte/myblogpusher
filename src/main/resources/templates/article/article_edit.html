<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>記事編集</title>
	<link rel="stylesheet" th:href="@{/css/article_edit.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div class="edit-box">
		<h1>記事編集</h1>

		<div id="savedMessage" th:if="${saved}"
			style="background-color:#d4edda; color:#155724; padding:12px 16px; border-radius:4px; margin-bottom:16px;">
			下書きが保存されました。
		</div>

		<form th:action="@{/article/save}" method="post">

			<div th:replace="~{fragments/article_form :: formFields}"></div>

			<div class="button-row">
				<button type="submit" formaction="/article/save" class="btn-save" disabled>一時保存</button>
				<button type="button" id="listButton" class="btn-back">下書き一覧</button>
				<button type="button" id="copyAllButton" class="btn-back">内容を一括コピー</button>
				<button type="button" id="clearButton" class="btn-clear">クリア</button>
				<button type="submit" formaction="/article/correct" class="btn-publish" disabled>添削</button>
				<button type="button" class="btn-publish" id="publishButton">投稿</button>
				<button type="button" id="codeBlockButton" class="btn-back">コードブロック</button>
<button type="button" id="imageButton" class="btn-back">📷 画像挿入</button>

<div id="imageModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
	<div style="background: #fff; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; border-radius: 8px; width: 80%; max-height: 80%; overflow-y: auto;">
		<h2>画像選択</h2>
		<div id="imageList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px;"></div>
		<button type="button" onclick="document.getElementById('imageModal').style.display='none';" class="btn-back">キャンセル</button>
	</div>
</div>
				<button type="button" id="backButton" class="btn-back">戻る</button>
			</div>

		</form>
	</div>

	<script th:src="@{/js/article_edit.js}"></script>
</body>

</html>
