<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>記事編集</title>
	<link rel="stylesheet" th:href="@{/css/article_edit.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div class="edit-box">
		<h1>記事編集</h1>

		<div id="savedMessage" th:if="${saved}"
			style="background-color:#d4edda; color:#155724; padding:12px 16px; border-radius:4px; margin-bottom:16px;">
			下書きが保存されました。
		</div>

		<form th:action="@{/article/save}" method="post">

			<div th:replace="~{fragments/article_form :: formFields}"></div>

			<div class="button-row">
				<button type="submit" formaction="/article/save" class="btn-save" disabled>一時保存</button>
				<button type="button" id="listButton" class="btn-back">下書き一覧</button>
				<button type="button" id="copyAllButton" class="btn-back">内容を一括コピー</button>
				<button type="submit" formaction="/article/correct" class="btn-publish" disabled>添削</button>
				<button type="button" class="btn-publish" id="publishButton">投稿</button>

				<script>
					document.getElementById('publishButton').addEventListener('click', function () {
						const workId = new URLSearchParams(window.location.search).get('workId');
						const title = document.querySelector('input[name="title"]').value;
						const content = document.querySelector('textarea[name="content"]').value;
						const categorySelect = document.querySelector('select[name="categorySelect"]').value;
						const newCategoryName = document.querySelector('input[name="newCategoryName"]')?.value || '';

						if (!title || !content) {
							alert('タイトルと本文を入力してください');
							return;
						}

						// フォームを作成して投稿確認画面に遷移
						const form = document.createElement('form');
						form.method = 'POST';
						form.action = '/publish/preview';

						const fields = {
							workId: workId || '',
							title: title,
							content: content,
							categorySelect: categorySelect,
							newCategoryName: newCategoryName
						};

						for (const [key, value] of Object.entries(fields)) {
							const input = document.createElement('input');
							input.type = 'hidden';
							input.name = key;
							input.value = value;
							form.appendChild(input);
						}

						document.body.appendChild(form);
						form.submit();
					});
				</script>
				<button type="button" id="backButton" class="btn-back">戻る</button>
			</div>

		</form>
	</div>

	<script th:src="@{/js/article_edit.js}"></script>
</body>

</html>
