<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>カテゴリー辞典</title>
	<link rel="stylesheet" th:href="@{/css/article_edit.css}">
	<link rel="stylesheet" th:href="@{/css/home.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div class="home-header">
		<h1>カテゴリー辞典</h1>
		<form th:action="@{/logout}" method="post">
			<button type="submit" class="btn-logout-link">ログアウト</button>
		</form>
	</div>
	<div style="margin-bottom: 10px;">
		<button type="button" id="addCategoryButton" class="btn-correct">
			カテゴリー追加
		</button>
	</div>

	<table>
		<thead>
			<tr>
				<th>カテゴリー名</th>
				<th>表示名</th>
				<th>親カテゴリー</th>
				<th>使用中の誤字数</th>
				<th></th>
			</tr>
		</thead>

		<tbody>
			<tr th:each="c : ${categories}">
				<td th:text="${c.categoryName}"></td>
				<td th:text="${c.displayName}"></td>
				<td th:text="${c.parentCategoryId}"></td>
				<td th:text="${c.typoCount}"></td>
				<td>
					<form th:if="${c.deletable}" th:action="@{/category/delete}" method="post" style="display:inline;"
						onsubmit="return confirm('このカテゴリーを削除してもよろしいですか？');">
						<input type="hidden" name="categoryId" th:value="${c.categoryId}">
						<button type="submit" class="btn-delete">削除</button>
					</form>
					<span th:unless="${c.deletable}" style="color:#999; font-size:13px;">使用中</span>
					<button type="button" class="btn-correct btn-update" th:data-category-id="${c.categoryId}"
						th:data-category-name="${c.categoryName}" th:data-parent-category-id="${c.parentCategoryId}"
						th:data-display-name="${c.displayName}">
						編集
					</button>
				</td>
			</tr>
		</tbody>
	</table>

	<button type="button" id="backButton" class="btn-back">戻る</button>

	<div th:replace="~{fragments/category_modal :: categoryModal}"></div>

	<script th:inline="javascript">
		const categories = /*[[${categories}]]*/[];
	</script>
	<script th:src="@{/js/common.js}"></script>
	<script th:src="@{/js/category_list.js}"></script>

</body>

</html>
