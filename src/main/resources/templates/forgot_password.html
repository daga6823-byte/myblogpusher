<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>パスワードをお忘れの方</title>
	<link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
	<div class="login-box">

		<!-- 本人確認フォーム -->
		<div th:if="${mode == 'forgot'}">
			<h1>パスワードをお忘れの方</h1>

			<p class="error" th:if="${error}" th:text="${error}"></p>

			<form th:action="@{/login/forgot}" method="post">
				<label for="loginId">ログインID</label>
				<input type="text" id="loginId" name="loginId" required>

				<label for="email">登録済みメールアドレス</label>
				<input type="email" id="email" name="email" required>

				<button type="submit">確認する</button>
			</form>

			<div class="register-link">
				<a th:href="@{/login}">ログイン画面に戻る</a>
			</div>
		</div>

		<!-- 新パスワード設定フォーム -->
		<div th:if="${mode == 'reset'}">
			<h1>新しいパスワードの設定</h1>

			<p class="error" th:if="${error}" th:text="${error}"></p>

			<form th:action="@{/login/reset}" method="post">
				<label for="newPassword">新しいパスワード</label>
				<input type="password" id="newPassword" name="newPassword" required>

				<label for="newPasswordConfirm">新しいパスワード（確認用）</label>
				<input type="password" id="newPasswordConfirm" name="newPasswordConfirm" required>

				<button type="submit">パスワードを変更する</button>
			</form>
		</div>

		<!-- 完了表示 -->
		<div th:if="${mode == 'done'}">
			<h1>パスワードを変更しました</h1>
			<p>新しいパスワードでログインしてください。</p>

			<div class="register-link">
				<a th:href="@{/login}">ログイン画面へ</a>
			</div>
		</div>

	</div>
</body>

</html>
