<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

	<div th:fragment="formFields">
		<input type="hidden" name="workId" th:value="${work != null ? work.workId : ''}">

		<label for="categorySelect">カテゴリー</label>
		<select id="categorySelect" name="categorySelect" onchange="toggleNewCategory()">
			<option value="">選択してください</option>
			<option th:each="cat : ${categories}" th:value="${cat.categoryName}" th:text="${cat.categoryName}"
				th:selected="${cat.categoryName == categoryName}"></option>
			<option value="__new__">＋ 新しいカテゴリーを追加</option>
		</select>

		<input type="text" id="newCategoryName" name="newCategoryName" placeholder="新しいカテゴリー名を入力" style="display:none;">

		<label for="title">タイトル</label>
		<input type="text" id="title" name="title" th:value="${work != null ? work.title : ''}">

		<label for="content">本文（Markdown）</label>
		<div class="content-wrapper">
			<div id="contentHighlight" class="content-highlight"></div>
			<textarea id="content" name="content" th:text="${work != null ? work.content : ''}"></textarea>
			<div class="editor-toolbar">
				<button type="button" id="insertMenuButton" class="btn-insert">＋</button>
				<div id="insertMenu" class="insert-menu" style="display:none;">
					<button type="button" id="codeBlockButton">コードブロック</button>
					<button type="button" id="imageButton">📷 画像挿入</button>
				</div>
			</div>

			<input type="hidden" id="redirectTo" name="redirectTo" value="">
			<input type="hidden" id="workId" name="workId" th:value="${work != null ? work.workId : ''}">
		</div>

</body>

</html>
