<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

	<div th:fragment="imageModal" id="imageModal"
		style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
		<div
			style="background: #fff; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; border-radius: 8px; width: 80%; max-height: 80%; overflow-y: auto;">
			<h2>画像選択</h2>

			<div style="border: 1px solid #ddd; padding: 12px; border-radius: 4px; margin-bottom: 16px;">
				<label for="imageFolderName">保存先フォルダ</label>
				<input type="text" id="imageFolderName" placeholder="カテゴリーから自動入力されます">

				<label for="imageFileInput">画像ファイル</label>
				<input type="file" id="imageFileInput" accept="image/*">

				<button type="button" id="imageUploadButton" class="btn-back">アップロード</button>
				<span id="imageUploadStatus" style="margin-left:8px; font-size:13px;"></span>
			</div>

			<div style="margin-bottom: 8px;">
				<button type="button" id="imageScopeToggle" class="btn-back">全カテゴリー表示に切り替え</button>
			</div>

			<div id="imageList"
				style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px;">
			</div>
			<button type="button" onclick="document.getElementById('imageModal').style.display='none';"
				class="btn-back">キャンセル</button>
		</div>
	</div>

</body>

</html>
