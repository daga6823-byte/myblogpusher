<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ホーム</title>

	<link rel="stylesheet" th:href="@{/css/home.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div class="box">
		<div class="home-header">
			<h1 th:text="${userName} + ' さん、ようこそ'"></h1>
			<form th:action="@{/logout}" method="post">
				<button type="submit" class="btn-logout-link">ログアウト</button>
			</form>
		</div>

		<div th:if="${isGuest}" class="guest-notice">
			現在、管理者の承認待ちです。承認されるまで一部機能はご利用いただけません。
		</div>

		<ul>
			<li th:each="menu : ${menus}">
				<a th:href="${menu.menuUrl}" th:text="${menu.menuName}"></a>
			</li>
		</ul>
	</div>

</body>

</html>
