<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<!--
		登録済み画像一覧画面

		・登録済み画像一覧表示
		・カテゴリー絞り込み
		・画像編集モーダル呼び出し
		・未登録画像インポート
		・新規画像登録画面遷移
	-->

	<meta charset="UTF-8">
	<title>登録済み画像</title>

	<link rel="stylesheet" th:href="@{/css/home.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/image_list.css}">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

	<!-- 画像編集モーダル -->
	<div th:replace="~{fragments/image_edit_modal :: imageEditModal}"></div>

	<div class="home-header">

		<h1>登録済み画像</h1>

		<div>

			<!-- カテゴリー絞り込み -->
			<select id="imageCategorySelect">

				<option value="all">全カテゴリー</option>

				<option th:each="category : ${categories}" th:value="${category.categoryId}"
					th:text="${category.displayName}" th:selected="${category.categoryId == selectedCategoryId}">
				</option>

			</select>

			<!-- 新規画像登録 -->
			<button type="button" id="newImageButton" class="btn-save">
				新規画像登録
			</button>

			<!-- Supabase画像インポート -->
			<button type="button" id="importButton" class="btn-back">
				Supabaseから未登録画像をインポート
			</button>

		</div>

	</div>

	<!-- 登録済み画像一覧 -->
	<div class="image-list">

		<!-- 画像カード -->
		<div th:each="img : ${images}" class="image-card">

			<img th:src="${img.url}" class="image-thumbnail">

			<div class="image-path" th:text="${img.folderName + '/' + img.fileName}">
			</div>

			<div class="image-category" th:text="${img.categoryName}">
			</div>

			<div class="image-date" th:text="${img.uploadDate}">
			</div>

			<!-- 編集 -->
			<button type="button" class="btn-correct btn-update" th:data-image-id="${img.imageId}"
				th:data-category-id="${img.categoryId}" th:data-folder-name="${img.folderName}">
				編集
			</button>

			<!-- 削除 -->
			<button type="button" class="btn-delete btn-image-delete" th:data-image-id="${img.imageId}">
				削除
			</button>

		</div>

	</div>

	<button type="button" id="backButton" class="btn-back" onclick="location.href='/home'">
		戻る
	</button>

	<script th:src="@{/js/common.js}"></script>
	<script th:src="@{/js/image_list.js}"></script>

</body>

</html>
