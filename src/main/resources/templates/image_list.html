<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>登録済み画像</title>
	<link rel="stylesheet" th:href="@{/css/home.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div class="home-header">

		<h1>登録済み画像</h1>

		<div>
			<select id="imageCategorySelect">
				<option value="">全カテゴリー</option>

				<option th:each="category : ${categories}" th:value="${category.categoryId}"
					th:text="${category.displayName}">
				</option>

			</select>

			<button type="button" id="newImageButton" class="btn-save">
				新規画像登録
			</button>

			<button type="button" id="importButton" class="btn-back">
				Supabaseから未登録画像をインポート
			</button>

		</div>

	</div>

	<button type="button" id="backButton" class="btn-back" onclick="location.href='/home'">戻る</button>

	<script th:src="@{/js/common.js}"></script>
	<script>
		document.getElementById('importButton').addEventListener('click', () => {
			const status = document.getElementById('importStatus');
			status.textContent = 'インポート中...';
			fetch('/image/import', {method: 'POST'})
				.then(res => res.json())
				.then(data => {
					status.textContent = `${data.importedCount}件インポートしました`;
					location.reload();
				})
				.catch(() => {status.textContent = 'インポートに失敗しました';});
		});
	</script>
</body>

</html>
