<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>登録済み画像</title>
	<link rel="stylesheet" th:href="@{/css/home.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div class="home-header">

		<h1>登録済み画像</h1>

		<div>
			<select id="imageCategorySelect">
				<option value="all">全カテゴリー</option>

				<option th:each="category : ${categories}" th:value="${category.categoryId}"
					th:text="${category.displayName}">
				</option>

			</select>

			<button type="button" id="newImageButton" class="btn-save">
				新規画像登録
			</button>

			<button type="button" id="importButton" class="btn-back">
				Supabaseから未登録画像をインポート
			</button>

		</div>

	</div>

	<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px;">

		<div th:each="img : ${images}" style="border:1px solid #ddd; border-radius:4px; padding:8px;">

			<img th:src="${img.url}" style="width:100%; height:140px; object-fit:cover;">

			<div style="font-size:12px; margin-top:4px; word-break:break-all;"
				th:text="${img.folderName + '/' + img.fileName}">
			</div>

			<div style="font-size:12px; color:#666;" th:text="${img.categoryName}">
			</div>

			<div style="font-size:11px; color:#999;" th:text="${img.uploadDate}">
			</div>

		</div>

	</div>

	<button type="button" id="backButton" class="btn-back" onclick="location.href='/home'">戻る</button>

	<script th:src="@{/js/common.js}"></script>
	<script th:src="@{/js/image_list.js}"></script>
</body>

</html>
