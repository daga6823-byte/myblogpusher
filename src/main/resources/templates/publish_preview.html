<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>投稿確認</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
</head>

<body>
	<div class="box">
		<h1>投稿確認</h1>

		<div class="preview-section">
			<h2 th:text="${form.articleTitle}"></h2>
			<p class="repo-info">
				リポジトリ：<span th:text="${form.repoOwner}"></span> / <span th:text="${form.repoName}"></span>
			</p>
		</div>

		<div class="content-preview">
			<h3>プレビュー</h3>
			<pre th:text="${form.articleContent}"></pre>
		</div>

		<div class="button-row">
			<form id="publishForm" th:action="@{/publish/execute}" method="post" style="display: inline;"
				onsubmit="return publishSubmit();">
				<input type="hidden" name="workId" th:value="${form.articleId}">
				<input type="hidden" name="title" th:value="${form.articleTitle}">
				<input type="hidden" name="content" th:value="${form.articleContent}">
				<input type="hidden" name="categoryId" th:value="${form.categoryId}">
				<input type="hidden" id="slugHidden" name="slug" th:value="${form.slug}">
				<button id="publishButton" type="submit" class="btn-publish">
					投稿
				</button>
			</form>
			<button type="button" class="btn-back" onclick="window.history.back()">戻る</button>
		</div>
	</div>

	<div class="slug-section">
		<h3>ファイル名</h3>
		<div class="slug-input-row">
			<input type="text" id="slugInput" th:value="${form.slug}" style="width: 300px;">
			<span>.md</span>
		</div>

		<h3>形態素分析</h3>
		<table>
			<thead>
				<tr>
					<th>単語</th>
					<th>品詞</th>
					<th>変換結果</th>
					<th>辞書登録</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="token : ${analysis}" th:unless="${token.fromDictionary}">
					<td th:text="${token.surface}"></td>
					<td th:text="${token.partOfSpeech}"></td>
					<td>
						<input type="text" th:id="'converted_' + ${token.reading}" th:value="${token.converted}"
							style="width: 120px;">
					</td>
					<td>
						<form th:action="@{/english-dictionary/save}" method="post" style="display:inline;">
							<input type="hidden" th:name="japanese" th:value="${token.surface}">
							<input type="hidden" th:name="english" th:value="${token.converted}"
								th:id="'hidden_' + ${token.reading}">
							<input type="hidden" name="id" value="">
							<input type="hidden" name="returnTo" value="publish_preview">
							<button type="submit" class="btn-save" th:data-reading="${token.reading}"
								onclick="syncEnglish(this)">
								登録
							</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<div th:if="${error}" th:text="${error}"></div>

	<script th:src="@{/js/publish_preview.js}"></script>
</body>

</html>
