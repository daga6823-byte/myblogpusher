<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>жҠ•зЁҝзўәиӘҚ</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
</head>

<body>
	<div class="box">
		<h1>жҠ•зЁҝзўәиӘҚ</h1>

		<div class="preview-section">
			<h2 th:text="${form.articleTitle}"></h2>
			<p class="repo-info">
				гғӘгғқгӮёгғҲгғӘпјҡ<span th:text="${form.repoOwner}"></span> / <span th:text="${form.repoName}"></span>
			</p>
		</div>

		<div class="content-preview">
			<h3>гғ—гғ¬гғ“гғҘгғј</h3>
			<pre th:text="${form.articleContent}"></pre>
		</div>

		<div class="button-row">
			<form th:action="@{/publish/execute}" method="post" style="display: inline;">
				<input type="hidden" name="workId" th:value="${form.articleId}">
				<input type="hidden" name="title" th:value="${form.articleTitle}">
				<input type="hidden" name="content" th:value="${form.articleContent}">
				<input type="hidden" name="categoryId" th:value="${form.categoryId}">
				<input type="hidden" name="slug" th:value="${form.slug}">
				<button type="submit" class="btn-publish">жҠ•зЁҝ</button>
			</form>
			<button type="button" class="btn-back" onclick="window.history.back()">жҲ»гӮӢ</button>
		</div>
	</div>
	
	<div th:if="${error}" th:text="${error}"></div>
	
</body>

</html>
