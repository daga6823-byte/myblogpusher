<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>リポジトリ設定</title>
	<link rel="stylesheet" th:href="@{/css/repository-setting.css}">
</head>

<body>
	<div class="repository-setting-container">
		<h1>リポジトリ設定</h1>

		<p th:if="${param.saved}" class="success-message">設定を保存しました。</p>

		<form th:action="@{/repository/setting}" th:object="${form}" method="post">
			<div class="form-group">
				<label for="repoOwner">GitHubユーザー名（Organization）</label>
				<input type="text" id="repoOwner" th:field="*{repoOwner}" required>
			</div>

			<div class="form-group">
				<label for="repoName">リポジトリ名</label>
				<input type="text" id="repoName" th:field="*{repoName}" required>
			</div>

			<div class="form-group">
				<label for="accessToken">
					アクセストークン
					<span th:if="${registered}" class="hint">（変更する場合のみ入力）</span>
				</label>
				<input type="password" id="accessToken" th:field="*{accessToken}" th:required="${!registered}"
					autocomplete="off">
			</div>

			<div class="form-group">
				<label for="tokenExpiresAt">トークン有効期限</label>
				<input type="date" id="tokenExpiresAt" th:field="*{tokenExpiresAt}">
			</div>

			<button type="submit">保存</button>
		</form>
	</div>
</body>

</html>
