<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>誤字辞典</title>
	<link rel="stylesheet" th:href="@{/css/article_edit.css}">
	<link rel="stylesheet" th:href="@{/css/home.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div class="home-header">
		<h1>誤字辞典</h1>
		<form th:action="@{/logout}" method="post">
			<button type="submit" class="btn-logout-link">ログアウト</button>
		</form>
	</div>

	<!-- 新規登録フォーム -->
	<div style="margin-bottom: 24px; padding: 16px; background-color: #e9ecef; border-radius: 4px;">
		<h3 style="font-size: 14px; margin-bottom: 12px;">誤字パターンを新規登録</h3>
		<form th:action="@{/typo-dict/add}" method="post">
			<label for="newWrongWord">誤字</label>
			<input type="text" id="newWrongWord" name="wrongWord" required>

			<label for="newCorrectWord">正しい表記</label>
			<input type="text" id="newCorrectWord" name="correctWord" required>

			<label for="newCategoryId">カテゴリー</label>
			<select id="newCategoryId" name="categoryId">
				<option value="">汎用（全カテゴリー共通）</option>
				<option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.categoryName}">
				</option>
			</select>

			<button type="submit" class="btn-correct">登録する</button>
		</form>
	</div>

	<form th:action="@{/typo-dict/list}" method="get" style="margin-bottom: 16px;">

		<label for="categoryFilter">カテゴリーで絞り込み</label>
		<select id="categoryFilter" name="categoryId">
			<option value="">すべて表示</option>
			<option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.categoryName}"
				th:selected="${categoryId != null && categoryId == cat.categoryId}">
			</option>
		</select>

		<label for="typoSearch">誤字・正しい表記を検索</label>
		<input type="text" id="typoSearch" name="keyword" th:value="${keyword}" placeholder="検索文字を入力">

		<button type="submit" class="btn-correct">検索</button>

	</form>

	<!-- 一括操作バー -->
	<div style="margin-bottom: 16px; padding: 12px; background-color: #fff3cd; border-radius: 4px;">
		<label for="bulkCategorySelect">選択項目のカテゴリーを変更</label>
		<select id="bulkCategorySelect">
			<option value="">汎用（全カテゴリー共通）</option>
			<option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.categoryName}"></option>
		</select>
		<button type="button" id="bulkCategoryButton" class="btn-correct">カテゴリーを変更</button>
		<button type="button" id="bulkDeleteButton" class="btn-delete">選択項目を削除</button>
	</div>

	<form id="bulkCategoryForm" th:action="@{/typo-dict/bulk-category}" method="post" style="display:none;"></form>
	<form id="bulkDeleteForm" th:action="@{/typo-dict/bulk-delete}" method="post" style="display:none;"></form>

	<table>
		<thead>
			<tr>
				<th><input type="checkbox" id="selectAllTypoCheckbox"></th>
				<th class="sortable" data-sort="category">カテゴリー <span class="sort-icon"></span></th>
				<th class="sortable" data-sort="wrong">誤字 <span class="sort-icon"></span></th>
				<th class="sortable" data-sort="correct">正しい表記 <span class="sort-icon"></span></th>
				<th></th>
			</tr>
		</thead>
		<tbody id="typoTableBody">
			<tr th:each="t : ${typos}" th:data-category="${t.categoryName}" th:data-wrong="${t.wrongWord}"
				th:data-correct="${t.correctWord}">
				<td><input type="checkbox" class="bulk-typo-checkbox" th:value="${t.typoId}"></td>
				<td th:text="${t.categoryName}"></td>
				<td th:text="${t.wrongWord}"></td>
				<td th:text="${t.correctWord}"></td>
				<td>
					<button type="button" class="btn-correct btn-edit-typo" th:data-typo-id="${t.typoId}"
						th:data-wrong-word="${t.wrongWord}" th:data-correct-word="${t.correctWord}">
						編集
					</button>
					<form th:action="@{/typo-dict/delete}" method="post" style="display:inline;"
						onsubmit="return confirm('この誤字パターンを削除してもよろしいですか？');">
						<input type="hidden" name="typoId" th:value="${t.typoId}">
						<button type="submit" class="btn-delete">削除</button>
					</form>
				</td>
			</tr>
		</tbody>
	</table>

	<div id="pagination" style="margin: 16px 0; text-align: center;">

		<a th:if="${currentPage > 0}" th:href="@{/typo-dict/list(
			page=${currentPage - 1},
			keyword=${keyword},
			categoryId=${categoryId}
		)}" class="btn-back">
			前へ
		</a>

		<span style="margin: 0 16px;" th:text="${currentPage + 1} + ' / ' + ${totalPages}">
		</span>

		<a th:if="${currentPage + 1 < totalPages}" th:href="@{/typo-dict/list(
			page=${currentPage + 1},
			keyword=${keyword},
			categoryId=${categoryId}
		)}" class="btn-correct">
			次へ
		</a>

	</div>

	<button type="button" id="backButton" class="btn-back">戻る</button>

	<script th:src="@{/js/common.js}"></script>
	<script th:src="@{/js/typo_dict.js}"></script>
</body>

</html>
